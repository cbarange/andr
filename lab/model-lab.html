      K.cyl(root, P.metal, {h:0.1,d:0.1,t:8}, [0.22, FND+0.69, dz+0.21], {rot:[Math.PI/2,0,0]});          // anneau-poignée
      K.box(root, wl, [0.94,0.14,0.12], [0, FND+1.4, dz+0.1]);                                            // linteau
      K.box(root, stone, [1.0,0.16,0.4], [0, 0.08, dz+0.28]);                                              // seuil
      // --- LUCARNE À BARREAUX (façade droite) ---
      const win=K.node(root, [0.86, FND+1.0, dz+0.04]);
      K.box(win, [0.04,0.03,0.02], [0.42,0.42,0.1], [0,0,0]);
      for(let i=0;i<3;i++) K.cyl(win, P.metalDark, {h:0.44,d:0.03,t:5}, [-0.14+i*0.14,0,0.06]);
      K.box(win, wd, [0.52,0.09,0.1],[0,0.25,0.04]); K.box(win, wd, [0.52,0.09,0.1],[0,-0.25,0.04]);
      // --- RÂTELIER DE MOUSQUETS (mur droit +X) ---
      const rk=K.node(root, [W/2-0.02, 0, -0.15]);
      K.box(rk, wd, [0.1, 1.1, 1.3], [0.06, FND+0.55, 0]);
      K.box(rk, wd, [0.18, 0.08, 1.3], [0.16, FND+1.0, 0]);
      for(let i=0;i<4;i++){ const z=-0.45+i*0.3; K.cyl(rk, P.metalDark, {h:1.2,d:0.04,t:5}, [0.22, FND+0.62, z], {rot:[0.12,0,0]}); K.box(rk, wd, [0.1,0.28,0.1], [0.22, FND+0.13, z+0.07], {rot:[0.12,0,0]}); }
      // --- TONNEAUX DE POUDRE marqués (avant gauche) ---
      for(const [x,z] of [[-1.55,0.5],[-1.55,-0.1],[-1.18,0.2]]) { const b=K.node(root,[x,0,z]); K.cyl(b, [0.26,0.2,0.15], {h:0.6,dt:0.42,db:0.36,t:9}, [0,0.3,0]); K.tor(b, P.metalDark, {d:0.44,thick:0.04,t:12}, [0,0.18,0]); K.tor(b, P.metalDark, {d:0.44,thick:0.04,t:12}, [0,0.46,0]); K.cyl(b, P.dark, {h:0.04,d:0.34,t:9}, [0,0.6,0]); K.box(b, P.bone, [0.16,0.16,0.02], [0,0.32,0.21]); } // marque claire
      // --- POSTE DE FONTE DES BALLES (avant droit — fonction du bâtiment) ---
      const cast=K.node(root, [1.75, 0, 0.6]);
      K.box(cast, sd, [0.6,0.5,0.5], [0,0.25,0]);                                    // foyer pierre
      K.box(cast, P.ember, [0.34,0.16,0.3], [0,0.2,0.06], {emi:1.0,unlit:true});     // braises
      K.cyl(cast, P.metalDark, {h:0.2,dt:0.26,db:0.18,t:10}, [0,0.6,0]);             // creuset
      K.cyl(cast, P.emberHot, {h:0.04,d:0.2,t:10}, [0,0.7,0], {emi:1.1,unlit:true}); // plomb fondu
      K.cyl(cast, P.metalDark, {h:0.42,d:0.03,t:5}, [0.32,0.6,0], {rot:[0,0,1.0]});  // louche
      for(let i=0;i<3;i++) K.box(cast, P.metalDark, [0.3,0.07,0.1], [0.42,0.05+i*0.08,-0.32], {rot:[0,0.2,0]}); // lingots de plomb
      const pail=K.node(cast,[-0.52,0,-0.28]); K.cyl(pail, P.metalDark, {h:0.22,dt:0.18,db:0.14,t:9}, [0,0.11,0]); for(let i=0;i<5;i++){const a=i/5*6.283; K.sph(pail, P.metal, {d:0.06,seg:4}, [Math.cos(a)*0.05,0.23,Math.sin(a)*0.05]);} // seau de balles
      // --- CAISSES DE MUNITIONS (avant, près de la porte) ---
      K.box(root, P.wood, [0.5,0.3,0.4], [-0.6,0.15,dz+0.5]); K.box(root, wd, [0.52,0.05,0.42], [-0.6,0.32,dz+0.5]);

      return root;
    },
  });

      spots.forEach(([x,z], i) => {
        const h = 0.9 + (i % 4) * 0.22;
        const lean = ((i % 3) - 1) * 0.1;
        K.cyl(root, P.reed, { h:h, dt:0.012, db:0.03 }, [x, h/2 + 0.04, z], { rot:[lean, 0, lean] });
        const tx = x + lean * h * 0.5, tz = z + lean * h * 0.5, ty = h + 0.04;
        if (i % 3 === 0) {
          K.cyl(root, P.reedHead, { h:0.22, dt:0.07, db:0.07, t:7 }, [tx, ty - 0.06, tz]); // massette
          K.cyl(root, P.reed, { h:0.12, d:0.015 }, [tx, ty + 0.08, tz]);
        } else {
          K.cone(root, P.reed, { h:0.34, d:0.07, t:4 }, [tx, ty, tz], { scale:[1, 1, 0.3] }); // feuille effilée
        }
      });
      return root;
    },
  });

  add({
    id:'outpost', name:'Avant-poste', cat:'Sites',
    desc:"[site outpost · M7] Abri UNIFIÉ (« un lieu sûr dans les terres sauvages ») : toit en appentis sur 3 poteaux, le FEU dehors devant ; sous l'abri une caisse en bois surmontée de la gourde d'eau ; à l'arrière (opposé au feu) une toile de cuir tendue du toit au sol (~110°) ; entre les 2 poteaux arrière, une barre où sèchent 3 à 8 lanières de viande (aléatoire). Point de recharge / voyage rapide.",
    build(K, ctx) {
      const root = K.node();
      const SIDE = 0.85, BACK = -0.85, FRONT = 0.95;
      const HB = 2.3, HF = 1.65;            // poteaux arrière (hauts) / avant (court)
      const leather = P.hide;
      // 3 POTEAUX : 2 à l'arrière (côté toile), 1 à l'avant-centre (côté feu).
      K.cyl(root, P.woodDark, { h:HB, d:0.13 }, [-SIDE, HB/2, BACK]);
      K.cyl(root, P.woodDark, { h:HB, d:0.13 }, [ SIDE, HB/2, BACK]);
      K.cyl(root, P.woodDark, { h:HF, d:0.13 }, [0, HF/2, FRONT]);
      // Poutre faîtière reliant les 2 poteaux arrière.
      K.cyl(root, P.woodDark, { h:1.95, d:0.08 }, [0, HB, BACK], { rot:[0, 0, Math.PI/2] });
      // TOIT en appentis (haut à l'arrière, bas à l'avant) reposant sur les 3 poteaux.
      K.box(root, P.roof, [2.0, 0.12, 2.1], [0, 1.98, 0], { rot:[0.358, 0, 0] });
      // --- FEU DE CAMP détaillé, DEHORS DEVANT (décalé à GAUCHE de 1,5× sa taille,
      //     et RAPPROCHÉ de la cabane de 1× sa taille). ---
      const FS = 0.8; // taille (diamètre) du foyer
      const fire = K.node(root, [-1.5 * FS, 0, (FRONT + 1.15) - 1.0 * FS]);
      for (let i = 0; i < 6; i++) { const a = i/6*Math.PI*2; K.box(fire, P.stoneDark, [0.16, 0.15, 0.16], [Math.cos(a)*0.32, 0.08, Math.sin(a)*0.32], { rot:[0, a, 0] }); }
      for (let i = 0; i < 3; i++) K.cyl(fire, P.trunk, { h:0.6, d:0.08 }, [0, 0.13, 0], { rot:[0, i*1.05, Math.PI/2] });
      K.sph(fire, P.ember, { d:0.24, seg:6 }, [0, 0.16, 0], { emi:1.7, unlit:true });
      K.cone(fire, P.fire, { h:0.42, d:0.24, t:6 }, [0, 0.35, 0], { emi:1.5, unlit:true });
      K.cone(fire, P.emberHot, { h:0.3, d:0.15, t:6 }, [0.07, 0.32, -0.03], { emi:1.7, unlit:true });
      K.cone(fire, P.fire, { h:0.26, d:0.13, t:6 }, [-0.07, 0.3, 0.05], { emi:1.4, unlit:true });
      // --- CAISSE EN BOIS + GOURDE dessus, sous l'abri ---
      K.box(root, P.wood, [0.7, 0.55, 0.6], [-0.32, 0.28, -0.1]);
      K.box(root, P.woodLight, [0.74, 0.07, 0.64], [-0.32, 0.59, -0.1]); // couvercle
      K.box(root, P.metalDark, [0.08, 0.2, 0.05], [-0.32, 0.4, 0.21]); // ferrure
      const g = K.node(root, [-0.32, 0.62, -0.1]); // gourde POSÉE sur la caisse
      K.sph(g, [0.4, 0.47, 0.34], { d:0.3, seg:8 }, [0, 0.16, 0], { scale:[1, 1.15, 0.8] });
      K.cyl(g, [0.36, 0.43, 0.31], { h:0.1, dt:0.07, db:0.13 }, [0, 0.33, 0]);
      K.cyl(g, P.woodDark, { h:0.06, d:0.08 }, [0, 0.4, 0]);
      K.tor(g, P.woodDark, { d:0.27, thick:0.022, t:10 }, [0, 0.2, 0], { rot:[0.5, 0, 0] });
      // --- TOILE DE CUIR : UNE seule nappe courbe (ribbon) tendue du toit au sol, ~110° ---
      //     Finition : surface continue + léger galbe + ourlet roulé en bas + latte au faîte.
      const sc = ctx.scene, SPAN = 110 * Math.PI / 180, N = 16, R = 1.55;
      const top = [], mid = [], bot = [];
      for (let k = 0; k <= N; k++) {
        const t = k / N;                                   // 0 = gauche, 1 = droite
        const a = Math.PI + (0.5 - t) * SPAN;              // arc centré sur l'arrière (-Z)
        // HAUT : ligne DROITE le long du bord arrière du toit -> la toile y est jointe.
        const tx = -0.92 + t * 1.84, ty = 2.30, tz = -0.96;
        // BAS : arc évasé au sol, DERRIÈRE et à l'extérieur des poteaux (z < -0.85).
        const bx = Math.sin(a) * R, bz = Math.cos(a) * R - 0.05;
        top.push(new BABYLON.Vector3(tx, ty, tz));
        bot.push(new BABYLON.Vector3(bx, 0.02, bz));
        // MILIEU : interpolation + léger galbe (recul) -> nappe qui bombe doucement.
        mid.push(new BABYLON.Vector3((tx + bx) / 2, 1.18, (tz + bz) / 2 - 0.06));
      }
      const lm = new BABYLON.StandardMaterial("outpostTarpMat", sc);
      lm.diffuseColor = new BABYLON.Color3(leather[0], leather[1], leather[2]);
      lm.specularColor = new BABYLON.Color3(0, 0, 0);
      lm.backFaceCulling = false; // visible des deux côtés
      const tarp = BABYLON.MeshBuilder.CreateRibbon("outpostTarp", { pathArray: [top, mid, bot] }, sc);
      tarp.material = lm; tarp.parent = root; tarp.convertToFlatShadedMesh();
      // ourlet roulé au bas (finition) + latte de bois au faîte (où la toile est lacée)
      const hem = BABYLON.MeshBuilder.CreateTube("outpostHem", { path: bot, radius: 0.05, tessellation: 6 }, sc);
      hem.material = K.mat([leather[0] * 0.78, leather[1] * 0.78, leather[2] * 0.78]); hem.parent = root;
      const batten = BABYLON.MeshBuilder.CreateTube("outpostBatten", { path: top, radius: 0.05, tessellation: 6 }, sc);
      batten.material = K.mat(P.woodDark); batten.parent = root;
      // --- BARRE À VIANDE SÉCHÉE entre les 2 poteaux arrière (un peu en pente) ---
      const barY = 1.45, slope = 0.09;
      K.cyl(root, P.woodLight, { h:1.85, d:0.05 }, [0, barY, BACK + 0.07], { rot:[0, 0, Math.PI/2 - slope] });
      const nMeat = 3 + Math.floor(Math.random() * 6); // 3..8 aléatoire
      for (let i = 0; i < nMeat; i++) {
        const x = nMeat > 1 ? -0.78 + (i / (nMeat - 1)) * 1.56 : 0;
        const by = barY + x * Math.tan(slope);
        K.box(root, [0.5, 0.2, 0.16], [0.07, 0.28, 0.05], [x, by - 0.16, BACK + 0.07]);
      }
      // Petit fanion-repère (l'avant-poste est un point de voyage rapide).
      K.cyl(root, P.woodLight, { h:0.5, d:0.04 }, [SIDE, HB + 0.25, BACK]);
      K.box(root, P.banner, [0.38, 0.26, 0.03], [SIDE + 0.21, HB + 0.42, BACK]);
      return root;
    },
  });

  add({

  add({

      // caisse blindée éventrée + plaque fondue

  add({
    id:'cache', name:'Cachette', cat:'Sites',
    desc:"[site cache · M9] Réserve dissimulée : coffre + sacs à demi enterrés, camouflés sous des branchages, marqués d'un cairn.",
    build(K) {
      const root = K.node();
      // Tertre de terre : la cache est à demi enterrée (entoure la base du coffre).
      K.cyl(root, [0.17, 0.15, 0.13], { h:0.16, d:1.9, t:16 }, [0, 0.05, 0]);
      // Coffre + couvercle + loquet + anse (légèrement enfoncé dans le tertre).
      K.box(root, P.wood, [0.9, 0.52, 0.6], [0, 0.24, 0]);
      K.box(root, P.woodDark, [0.94, 0.12, 0.64], [0, 0.52, 0]);
      K.box(root, P.metalDark, [0.1, 0.24, 0.05], [0, 0.32, 0.32]);
      K.tor(root, P.metalDark, { d:0.15, thick:0.03, t:10 }, [0, 0.46, 0.31], { rot:[Math.PI/2, 0, 0] });
      // Sacs (corps + col resserré) posés au sol de part et d'autre.
      const sack = (x, z, col, s) => {

      };
      sack(0.72, 0.16, P.hatStraw, 1.0);

      // Camouflage : branchages COURTS croisés sur le couvercle (restent sur le coffre).
      for (let i = 0; i < 4; i++) K.cyl(root, P.wood, { h:0.72, d:0.05 }, [-0.18 + i*0.14, 0.6, 0.02], { rot:[0, 0.4 + i*0.8, Math.PI/2] });
      // Branches APPUYÉES du sol au bord du couvercle (les deux bouts soutenus -> rien ne flotte).
      K.cyl(root, P.woodDark, { h:0.9, d:0.05 }, [0.0, 0.3, 0.5], { rot:[-0.9, 0, 0] });

      K.cyl(root, P.woodDark, { h:0.9, d:0.05 }, [-0.1, 0.3, -0.5], { rot:[0.9, 0, 0.2] });

      // Cairn-repère (3 pierres empilées).

  // ----- FEU ----------------------------------------------------------------
  add({
    id:'feu', name:'Feu de camp', cat:'Feu',
    desc:"Le cœur du jeu. Foyer travaillé : lit de cendres + braises rougeoyantes, cercle de CAILLOUX arrondis (légèrement enterrés), bûches à plat en CROIX symétrique (un seul niveau), FLAMME sculptée en couches (rouge→orange→jaune→cœur) DÉGAGÉE, avec flammèche animée, lumière chaude + étincelles.",
    build(K, ctx) {
      const root = K.node();
      const char=[0.1,0.09,0.085], ash=[0.17,0.16,0.15], emberC=P.ember, hot=P.emberHot, fireC=P.fire;
      const yellow=[1.0,0.86,0.4], coreC=[1.0,0.95,0.72], deep=[0.82,0.22,0.08], bark2=[0.24,0.17,0.12];

      // --- LIT : sol calciné + cendres (légèrement bombé) ---
      K.cyl(root, ash, { h:0.07, dt:2.0, db:2.2, t:18 }, [0, 0.035, 0]);
      K.cyl(root, char, { h:0.07, dt:1.4, db:1.6, t:16 }, [0, 0.085, 0]);

      // --- CERCLE DE PIERRES : TOUS des CAILLOUX (ico aux proportions variées), légèrement enterrés ---
      const N = 9;
      for (let i = 0; i < N; i++) {
        const a = (i/N)*Math.PI*2 + Math.sin(i*2.3)*0.09;
        const r = 1.06 + Math.sin(i*1.7)*0.07;
        const s = 0.46 + Math.abs(Math.sin(i*3.1))*0.24;
        const col = i%3===0 ? P.stoneDark : (i%3===1 ? P.stone : [0.29,0.32,0.34]);
        const x = Math.cos(a)*r, z = Math.sin(a)*r;
        const sy = 0.72 + 0.22*Math.sin(i*1.9), sxz = 0.9 + 0.18*Math.cos(i*2.7); // galet plus ou moins aplati/allongé
        K.ico(root, col, { d:s, sub:1 }, [x, s*0.28, z], { rot:[Math.sin(i*1.3)*0.4, a, Math.cos(i*2.1)*0.3], scale:[sxz, sy, 1] });
        if (i%3===0) K.ico(root, P.stoneDark, { d:s*0.5, sub:1 }, [x*0.85, s*0.16, z*0.85], { rot:[0.2, a, 0.3], scale:[1,0.7,1] }); // petit caillou d'appoint
      }

      // --- BRAISES sur le lit : petits blocs émissifs bas (cœur incandescent) ---
      for (let i = 0; i < 8; i++) {
        const a = i*2.39, r = 0.18 + (i%3)*0.2;
        K.box(root, i%2 ? emberC : hot, [0.17, 0.1, 0.17], [Math.cos(a)*r, 0.12, Math.sin(a)*r], { emi:1.5, unlit:true, rot:[0,a,0] });
      }

      // --- BÛCHES : 3 grands RONDINS traversants à 60° -> ÉTOILE à 6 branches, symétrique, un seul niveau ---
      const lly = 0.22, lh = 1.3, ld = 0.2;            // 3 bûches pleines centrées -> 6 bouts qui dépassent
      const woods = [P.trunk, bark2, [0.31,0.22,0.15]];
      for (let i = 0; i < 3; i++) {
        const n = K.node(root, [0, lly, 0]); n.rotation.y = i*Math.PI/3;
        K.cyl(n, woods[i], { h:lh, d:ld, t:7 }, [0, 0, 0], { rot:[Math.PI/2, 0, 0] }); // rondin couché, orienté à i×60°
      }

      // --- FLAMME sculptée (node animé) : corps profond -> orange -> jaune -> cœur + langues ---
      const flame = K.node(root, [0, 0.34, 0]);
      K.ico(flame, deep, { d:0.72, sub:1 }, [0, 0.24, 0], { emi:1.5, unlit:true, scale:[1,1.55,1] });
      K.cone(flame, fireC, { h:1.05, d:0.62, t:6 }, [0, 0.56, 0], { emi:1.9, unlit:true });
      const t2 = K.cone(flame, yellow, { h:0.72, d:0.36, t:6 }, [0.05, 0.9, -0.02], { emi:2.3, unlit:true });
      const t3 = K.cone(flame, coreC,  { h:0.42, d:0.2,  t:5 }, [-0.03, 1.12, 0.03], { emi:2.7, unlit:true });
      const sL = K.cone(flame, fireC, { h:0.5,  d:0.24, t:5 }, [-0.24, 0.5, 0.08], { emi:1.9, unlit:true, rot:[0,0,0.42] });
      const sR = K.cone(flame, fireC, { h:0.46, d:0.22, t:5 }, [ 0.24, 0.48,-0.06], { emi:1.9, unlit:true, rot:[0,0,-0.46] });
      ctx.animate((tt) => {
        flame.scaling.y = 1 + Math.sin(tt*9)*0.07 + Math.sin(tt*17+1)*0.03; // pulsation
        flame.rotation.y = Math.sin(tt*3)*0.07;                              // léger balancement
        t2.rotation.z = Math.sin(tt*7)*0.13; t3.rotation.z = Math.sin(tt*11+2)*0.2;
        sL.scaling.y = 1 + Math.sin(tt*13)*0.22; sR.scaling.y = 1 + Math.sin(tt*13+2)*0.22;
      });

      // --- lumière chaude + étincelles + filet de fumée (nettoyés au changement de modèle) ---
      const light = new B.PointLight('fireLight', V3(0, 1.1, 0), ctx.scene);
      light.diffuse = new B.Color3(P.fire[0], P.fire[1], P.fire[2]);
      light.specular = new B.Color3(0,0,0);
      light.intensity = 1.7; light.range = 20;
      ctx.add(light);
      ctx.add(flameParticles(ctx.scene, V3(0, 0.7, 0)));
      smokePuffs(K, ctx, root, [0, 1.5, 0], [0.42,0.42,0.45]);
      return root;
    },
  });

  // ---- helpers de feedback (fumée, flammes) --------------------------------
  function smokePuffs(K, ctx, parent, pos, color) {
    const node = K.node(parent, pos);
    const c = color || [0.5,0.5,0.52];
    const puffs = [];
    for (let i = 0; i < 4; i++)
      puffs.push(K.sph(node, c, { d:0.35, seg:6 }, [0, i*0.4, 0], { alpha:0.55, unlit:true, emi:0.5 }));
    ctx.animate((t) => {
      puffs.forEach((p, i) => {
        const k = ((t*0.4 + i*0.28) % 1);
        p.position.y = k * 1.6;
        p.scaling.setAll(0.4 + 0.9*(1-k));
        p.position.x = Math.sin(k*4 + i) * 0.15;
      });
    });
    return node;
  }

  function discTex(scene) {
    const t = new B.DynamicTexture('disc', { width:32, height:32 }, scene, false);
    const c = t.getContext();
    const g = c.createRadialGradient(16,16,0,16,16,16);
    g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(1,'rgba(255,255,255,0)');
    c.fillStyle = g; c.fillRect(0,0,32,32);
    t.hasAlpha = true; t.update(); return t;
  }

  function flameParticles(scene, pos) {
    const ps = new B.ParticleSystem('flame', 80, scene);
    ps.particleTexture = discTex(scene);
    ps.emitter = pos.clone();
    ps.minEmitBox = V3(-0.18, 0, -0.18); ps.maxEmitBox = V3(0.18, 0.15, 0.18);
    ps.color1 = new B.Color4(1.0, 0.7, 0.25, 1);
    ps.color2 = new B.Color4(1.0, 0.4, 0.12, 1);
    ps.colorDead = new B.Color4(0.4, 0.12, 0.05, 0);
    ps.minSize = 0.15; ps.maxSize = 0.45;
    ps.minLifeTime = 0.3; ps.maxLifeTime = 0.7;
    ps.emitRate = 60;
    ps.gravity = V3(0, 2.5, 0);
    ps.direction1 = V3(-0.3, 1, -0.3); ps.direction2 = V3(0.3, 1.4, 0.3);
    ps.minEmitPower = 0.4; ps.maxEmitPower = 0.9;
    ps.blendMode = B.ParticleSystem.BLENDMODE_ADD;
    ps.start();
    return ps;
  }

  // ==========================================================================
  //  SCÈNE & VISUALISEUR
  // ==========================================================================
  const canvas = document.getElementById('c');
  const engine = new B.Engine(canvas, true, { preserveDrawingBuffer:true, stencil:true, alpha:false, premultipliedAlpha:false });
  const scene = new B.Scene(engine);
  // Fond de « studio » : un peu plus clair que le brouillard du jeu pour que les
  // modèles (souvent sombres) ressortent nettement lors de la revue.
  scene.clearColor = new B.Color4(0.14, 0.18, 0.22, 1);
  scene.fogColor = new B.Color3(P.fog[0], P.fog[1], P.fog[2]);
  scene.fogDensity = 0.02;

  // Fond dégradé « studio » (clair en haut → sombre en bas) : garantit du contraste
  // pour tout modèle, qu'il soit clair (bouleau) ou sombre (cape de la constructrice).
  const bgTex = new B.DynamicTexture('bg', { width:8, height:256 }, scene, false);
  (function(){ const x = bgTex.getContext(); const g = x.createLinearGradient(0,0,0,256);
    g.addColorStop(0,'#9aacb6'); g.addColorStop(0.5,'#566873'); g.addColorStop(1,'#212b32');
    x.fillStyle = g; x.fillRect(0,0,8,256); bgTex.update(); })();
  const bgLayer = new B.Layer('bg', null, scene, true);
  bgLayer.texture = bgTex;

  const K = makeKit(scene);

  // caméra orbite
  const camera = new B.ArcRotateCamera('cam', -Math.PI/2 - 0.5, 1.12, 12, V3(0, 1, 0), scene);
  camera.attachControl(canvas, true);
  camera.wheelDeltaPercentage = 0.02;
  camera.lowerBetaLimit = 0.15; camera.upperBetaLimit = Math.PI/2 + 0.2;
  camera.lowerRadiusLimit = 2; camera.upperRadiusLimit = 80;
  camera.minZ = 0.1;

  // lumières — esprit du jeu (teintes froides/chaudes) mais plus généreuses :
  // un labo doit montrer la FORME des modèles, pas l'ambiance crépusculaire.
  const hemi = new B.HemisphericLight('hemi', V3(0,1,0), scene);
  hemi.intensity = 0.9; hemi.diffuse = new B.Color3(0.7,0.78,0.9); hemi.groundColor = new B.Color3(0.2,0.24,0.26);
  const sun = new B.DirectionalLight('sun', V3(-0.5,-1,-0.45), scene);
  sun.position = V3(20, 40, 20); sun.intensity = 1.4; sun.diffuse = new B.Color3(1.0,0.94,0.84);
  // lumière d'appoint froide à l'opposé (débouche les ombres, lit les volumes)
  const fill = new B.DirectionalLight('fill', V3(0.6,-0.4,0.7), scene);
  fill.intensity = 0.55; fill.diffuse = new B.Color3(0.55,0.66,0.8); fill.specular = new B.Color3(0,0,0);

  // ombres de contact (aident à lire la forme et l'assise au sol)
  const shadowGen = new B.ShadowGenerator(1024, sun);
  shadowGen.useBlurExponentialShadowMap = true; shadowGen.blurKernel = 24; shadowGen.setDarkness(0.45);
  sun.shadowMinZ = 1; sun.shadowMaxZ = 120;

  // sol : grille de référence (1 unité / case)
  const gridTex = (() => {
    const t = new B.DynamicTexture('grid', { width:128, height:128 }, scene, false);
    const c = t.getContext();
    c.fillStyle = '#16242a'; c.fillRect(0,0,128,128);
    c.strokeStyle = '#3a5e57'; c.lineWidth = 5;
    c.strokeRect(0,0,128,128);
    t.update();
    t.wrapU = t.wrapV = B.Texture.WRAP_ADDRESSMODE;
    t.uScale = t.vScale = 60;
    return t;
  })();
  const ground = B.MeshBuilder.CreateGround('ground', { width:60, height:60, subdivisions:1 }, scene);
  const groundMat = new B.StandardMaterial('groundMat', scene);
  groundMat.diffuseTexture = gridTex;
  groundMat.specularColor = new B.Color3(0,0,0);
  groundMat.diffuseColor = new B.Color3(0.6,0.7,0.66);
  ground.material = groundMat;
  ground.receiveShadows = true;

  // post-process léger (comme le jeu)
  const pipe = new B.DefaultRenderingPipeline('def', true, scene, [camera]);
  pipe.fxaaEnabled = true;
  pipe.imageProcessing.contrast = 1.1;
  pipe.imageProcessing.exposure = 1.08;
  pipe.imageProcessing.toneMappingEnabled = true;
  pipe.imageProcessing.vignetteEnabled = true;
  pipe.imageProcessing.vignetteWeight = 1.1;
  pipe.bloomEnabled = true; pipe.bloomThreshold = 1.25; pipe.bloomWeight = 0.55; pipe.bloomScale = 0.5;
  pipe.grainEnabled = true; pipe.grain.intensity = 2.5; pipe.grain.animated = true;

  // état du visualiseur
  let currentRoot = null;
  let extras = [];       // lumières/particules à disposer
  let animators = [];    // callbacks d'animation (fumée…)
  let selected = MODELS[0];
  let showCurrent = false;
  let autoRotate = false; // table tournante DÉSACTIVÉE par défaut (l'utilisateur gère la caméra)
  let refMesh = null;
  let gridMode = false;
  let wire = false;

  function clearScene() {
    if (currentRoot) { currentRoot.dispose(false, true); currentRoot = null; }
    extras.forEach(e => e.dispose && e.dispose());
    extras = []; animators = [];
    shadowGen.getShadowMap().renderList = [];
  }

  function makeCtx() {
    return {
      scene,
      add: (o) => { extras.push(o); return o; },
      animate: (fn) => { animators.push(fn); },
    };
  }

  function applyWire(node) {
    node.getChildMeshes().forEach(m => { if (m.material) m.material.wireframe = wire; });
  }

  // N'ajoute QUE les meshes (pas les TransformNode) comme projeteurs d'ombre :
  // l'auto-extension de la projection appelle getBoundingInfo() sur chaque entrée.
  function castShadows(node) {
    node.getChildMeshes(false).forEach(m => { if (m.getTotalVertices() > 0) shadowGen.addShadowCaster(m); });
  }

  function frame(root) {
    const b = root.getHierarchyBoundingVectors(true);
    const center = b.min.add(b.max).scale(0.5);
    const size = b.max.subtract(b.min).length();
    camera.setTarget(new B.Vector3(center.x, Math.max(center.y, 0.6), center.z));
    camera.radius = size * 1.25 + 2;
    camera.lowerRadiusLimit = size * 0.3 + 1;
    camera.upperRadiusLimit = size * 5 + 20;
  }

  function showRefScale() {
    if (refMesh) { refMesh.dispose(false, true); refMesh = null; }
    if (!document.getElementById('btnRef').classList.contains('on')) return;
    const root = K.node();
    K.cyl(root, [0.9,0.9,0.95], { h:1.0, d:0.7, t:8, smooth:true }, [1.6, 0.9, 0], { smooth:true, alpha:0.25 });
    K.sph(root, [0.9,0.9,0.95], { d:0.7, seg:8, smooth:true }, [1.6, 1.4, 0], { smooth:true, alpha:0.25 });
    K.sph(root, [0.9,0.9,0.95], { d:0.7, seg:8, smooth:true }, [1.6, 0.4, 0], { smooth:true, alpha:0.25 });
    root.getChildMeshes().forEach(m => { m.material.alpha = 0.22; });
    refMesh = root;
  }

  function render() {
    clearScene();
    document.getElementById('btnRef').classList.contains('on'); // noop guard
    const ctx = makeCtx();
    if (gridMode) {
      renderGrid(ctx);
    } else {
      const builder = (showCurrent && selected.current) ? selected.current : selected.build;
      currentRoot = builder(K, ctx);
      castShadows(currentRoot);
      applyWire(currentRoot);
      frame(currentRoot);
    }
    showRefScale();
    updateInfo();
  }

  function makeLabel(text, pos) {
    const t = new B.DynamicTexture('lbl', { width:256, height:64 }, scene, false);
    t.hasAlpha = true;
    t.drawText(text, null, 44, 'bold 26px monospace', '#dfe9e2', 'transparent', true);
    const m = new B.StandardMaterial('lblm', scene);
    m.diffuseTexture = t; m.opacityTexture = t;
    m.emissiveColor = new B.Color3(0.85,0.92,0.86); m.disableLighting = true; m.backFaceCulling = false;
    const p = B.MeshBuilder.CreatePlane('lblp', { width:2.2, height:0.55 }, scene);
    p.material = m; p.position.copyFrom(pos); p.billboardMode = B.Mesh.BILLBOARDMODE_ALL;
    return p;
  }

  function renderGrid(ctx) {
    const items = MODELS.filter(m => m.grid !== false);
    const cols = Math.ceil(Math.sqrt(items.length));
    const gap = 6;
    const root = K.node();
    items.forEach((m, i) => {
      const cx = (i % cols - (cols-1)/2) * gap;
      const cz = (Math.floor(i/cols) - (Math.ceil(items.length/cols)-1)/2) * gap;
      const sub = m.build(K, ctx);
      sub.parent = root; sub.position.set(cx, 0, cz);
      const b = sub.getHierarchyBoundingVectors(true);
      makeLabel(m.name, new B.Vector3(cx, b.max.y + 0.5, cz)).parent = root;
    });
    currentRoot = root;
    castShadows(root);
    applyWire(root);
    // cadrage d'ensemble : vue plongeante qui embrasse toute la grille
    const b = root.getHierarchyBoundingVectors(true);
    const ext = Math.max(b.max.x - b.min.x, b.max.z - b.min.z);
    camera.setTarget(new B.Vector3((b.min.x+b.max.x)/2, 0.4, (b.min.z+b.max.z)/2));
    camera.beta = 0.82;
    camera.radius = ext * 1.05 + 6;
    camera.lowerRadiusLimit = 4; camera.upperRadiusLimit = ext * 4 + 40;
  }

  // ---- UI -----------------------------------------------------------------
  function buildList() {
    const list = document.getElementById('list');
    const cats = [];
    MODELS.forEach(m => { if (!cats.includes(m.cat)) cats.push(m.cat); });
    cats.forEach(cat => {
      const h = document.createElement('div'); h.className = 'cat'; h.textContent = cat; list.appendChild(h);
      MODELS.filter(m => m.cat === cat).forEach(m => {
        const el = document.createElement('div');
        el.className = 'item'; el.dataset.id = m.id;
        el.innerHTML = m.name + (m.current ? '<small>avant / après dispo.</small>' : '');
        el.onclick = () => selectModel(m.id);
        list.appendChild(el);
      });
    });
  }

  function selectModel(id) {
    const m = MODELS.find(x => x.id === id); if (!m) return;
    selected = m; gridMode = false;
    document.getElementById('btnGrid').classList.remove('on');
    if (!m.current) { showCurrent = false; document.getElementById('btnCmp').classList.remove('on'); }
    render();
    syncList();
  }

  function syncList() {
    document.querySelectorAll('.item').forEach(el =>
      el.classList.toggle('active', !gridMode && el.dataset.id === selected.id));
  }

  function updateInfo() {
    const cmpBtn = document.getElementById('btnCmp');
    if (gridMode) {
      document.getElementById('mName').textContent = 'Vue d\'ensemble';
      document.getElementById('mBadge').textContent = MODELS.filter(m=>m.grid!==false).length + ' modèles';
      document.getElementById('mDesc').textContent = 'Tous les modèles atomiques disposés sur la grille. Clique un nom à gauche pour l\'examiner en détail.';
      document.getElementById('mMode').style.display = 'none';
      cmpBtn.style.display = 'none';
      return;
    }
    document.getElementById('mName').textContent = selected.name;
    document.getElementById('mBadge').textContent = selected.cat;
    document.getElementById('mDesc').textContent = selected.desc || '';
    cmpBtn.style.display = selected.current ? '' : 'none';
    const mode = document.getElementById('mMode');
    if (showCurrent && selected.current) { mode.style.display = 'block'; mode.textContent = '▲ version ACTUELLE du jeu (telle quelle dans src/render)'; }
    else if (selected.current) { mode.style.display = 'block'; mode.textContent = '◆ proposition — bouton « avant / après » pour comparer'; }
    else mode.style.display = 'none';
  }

  // boutons
  const $ = (id) => document.getElementById(id);
  $('btnRot').onclick = function(){ autoRotate = !autoRotate; this.classList.toggle('on', autoRotate); };
  $('btnCmp').onclick = function(){ if (!selected.current) return; showCurrent = !showCurrent; this.classList.toggle('on', showCurrent); render(); };
  $('btnRef').onclick = function(){ this.classList.toggle('on'); showRefScale(); };
  $('btnShadow').onclick = function(){ const on = this.classList.toggle('on'); shadowGen.getShadowMap().refreshRate = on ? B.RenderTargetTexture.REFRESHRATE_RENDER_ONEVERYFRAME : 0; ground.receiveShadows = on; };
  $('btnGrid').onclick = function(){ gridMode = !gridMode; this.classList.toggle('on', gridMode); render(); syncList(); };
  $('btnWire').onclick = function(){ wire = this.classList.toggle('on'); if (currentRoot) applyWire(currentRoot); };
  $('btnFog').onclick = function(){ const on = this.classList.toggle('on'); scene.fogMode = on ? B.Scene.FOGMODE_EXP2 : B.Scene.FOGMODE_NONE; };
  $('btnShot').onclick = function(){ B.Tools.CreateScreenshot(engine, camera, { width:1600, height:1000 }); };

  document.addEventListener('keydown', (e) => {
    if (gridMode) return;
    const i = MODELS.indexOf(selected);
    if (e.key === 'ArrowRight') selectModel(MODELS[(i+1) % MODELS.length].id);
    else if (e.key === 'ArrowLeft') selectModel(MODELS[(i-1+MODELS.length) % MODELS.length].id);
    else if (e.key.toLowerCase() === 'r') $('btnRot').click();
    else if (e.key.toLowerCase() === 'c') $('btnCmp').click();
  });

  // boucle de rendu
  let t = 0;
  scene.onBeforeRenderObservable.add(() => {
    const dt = engine.getDeltaTime() / 1000;
    t += dt;
    if (autoRotate) camera.alpha += dt * 0.4;
    animators.forEach(fn => fn(t));
  });

  buildList();
  render();
  syncList();
  loader.style.display = 'none';

  engine.runRenderLoop(() => scene.render());
  window.addEventListener('resize', () => engine.resize());
})();
</script>
</body>
</html>
